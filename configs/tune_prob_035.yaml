seed: 7
output_dir: outputs/tune_prob_035
device: cpu

task:
  grid_size: 5
  num_types: 4
  digit_vocab_size: 10
  min_type_count: 6
  num_steps: 6

model:
  hidden_size: 32
  cue_embedding_dim: 8
  scene_embedding_dim: 16
  temperature: 0.25

training:
  batch_size: 128
  train_steps: 500
  val_batches: 20
  val_interval: 100
  log_interval: 25
  learning_rate: 0.001
  weight_decay: 0.0
  aux_loss_weight: 0.15
  attention_target_weight: 1.0
  stepwise_attention_target_weight: 0.25
  cue_switch_transition_weight: 0.2
  attention_entropy_weight: 0.0
  cue_switch_probability: 0.35
  cue_switch_step: 3

evaluation:
  test_batches: 40
  probe_scenes: 4
  predictive_probe:
    train_batches: 12
    test_batches: 6
    epochs: 60
    learning_rate: 0.05
    thresholds:
      min_advantage_cross_entropy: 0.01
      min_advantage_mse: 0.00001
      min_advantage_top1_match: 0.05
  intervention_test:
    enabled: true
    probe_scenes: 4
    step: 2
    thresholds:
      min_attention_change_kl: 0.01
      min_original_target_attention_drop: 0.01
      min_alternate_target_attention_gain: 0.01
  stage3_multi_seed:
    enabled: true
    num_seeds: 3
    seed_stride: 100
  cue_switch:
    enabled: true
    probe_scenes: 4
    switch_step: 3
  report_probes:
    enabled: true
    train_batches: 12
    test_batches: 6
    epochs: 60
    learning_rate: 0.05
  reduced_shaping:
    enabled: true
    weights: [0.25, 0.0]
  ablations:
    - freeze_recurrence
    - feedforward_summary
    - zero_prev_glimpse
    - zero_prev_loss
    - zero_prev_confidence
    - zero_prev_attention
    - shuffle_cue
